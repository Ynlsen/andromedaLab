services:
  atuin:
    image: ghcr.io/atuinsh/atuin:latest
    container_name: atuin
    command: start
    volumes:
      - ./config:/config
    environment:
      ATUIN_HOST: "0.0.0.0"
      ATUIN_OPEN_REGISTRATION: "false"
      ATUIN_DB_URI: postgres://atuin:${ATUIN_DB_PASSWORD}@atuin-db/atuin
    labels:
      traefik.enable: true
      traefik.http.routers.atuin.rule: Host(`atuin.yniederer.ch`)
      traefik.http.routers.atuin.tls: true
      traefik.http.routers.atuin.tls.certresolver: letsencrypt
      traefik.http.services.atuin.loadbalancer.server.port: 8888
    networks:
      - local
      - atuin

  atuin-db:
    image: postgres:18-alpine
    container_name: atuin-db
    volumes:
      - ../../data/atuin/database:/var/lib/postgresql
    environment:
      POSTGRES_USER: atuin
      POSTGRES_DB: atuin
      POSTGRES_PASSWORD: ${ATUIN_DB_PASSWORD}
    networks:
      - local

networks:
  atuin:
    name: atuin
    external: true
  local:
